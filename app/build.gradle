plugins { id 'com.android.application' }
android {
    compileSdk 30
    defaultConfig {
        applicationId "com.calculatorjk.app"
        minSdk 21
        targetSdk 30
        versionCode 1
        versionName "1.2.5"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}