plugins {
    id 'com.android.application'
}
android {
    compileSdk 31
    defaultConfig {
        applicationId "com.calculatorjk.app"
        minSdk 21
        targetSdk 31
        versionCode 1
        versionName "1.2.5"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    lint {
        abortOnError false
    }
}